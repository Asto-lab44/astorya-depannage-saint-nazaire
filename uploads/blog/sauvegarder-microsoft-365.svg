<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0B1B3A"/>
    <stop offset="100%" stop-color="#1E3A8A"/>
  </linearGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#93C5FD" opacity="0.18"/>
  </pattern>
</defs>
<rect width="600" height="400" fill="url(#bg)"/>
<rect width="600" height="400" fill="url(#dots)"/>
<g transform="translate(30,30)">
<rect width="134" height="32" rx="16" fill="#0078D4" opacity="0.9"/>
<text x="67" y="21" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">MICROSOFT 365</text>
</g>
<g transform="translate(300,210)">
  <!-- nuage M365 -->
  <path d="M -120,0 Q -120,-60 -55,-60 Q -45,-100 15,-90 Q 80,-100 90,-50 Q 140,-50 140,0 Q 140,40 95,40 L -85,40 Q -120,40 -120,0 Z" fill="#fff"/>
  <!-- 4 carrés Microsoft -->
  <g transform="translate(0,-15)">
    <rect x="-30" y="-30" width="25" height="25" fill="#F25022"/>
    <rect x="5" y="-30" width="25" height="25" fill="#7FBA00"/>
    <rect x="-30" y="5" width="25" height="25" fill="#00A4EF"/>
    <rect x="5" y="5" width="25" height="25" fill="#FFB900"/>
  </g>
