    <polyline points="-12,8 0,20 12,8" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- disque dur -->
  <g transform="translate(0,140)">
    <rect x="-50" y="-12" width="100" height="24" rx="4" fill="#fff"/>
    <circle cx="-30" cy="0" r="4" fill="#10B981"/>
    <circle cx="-15" cy="0" r="4" fill="#10B981"/>
