<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#164E63"/>
    <stop offset="100%" stop-color="#155E75"/>
  </linearGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#93C5FD" opacity="0.18"/>
  </pattern>
</defs>
<rect width="600" height="400" fill="url(#bg)"/>
<rect width="600" height="400" fill="url(#dots)"/>
<g transform="translate(30,30)">
<rect width="102" height="32" rx="16" fill="#06B6D4" opacity="0.9"/>
<text x="51" y="21" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">FIBRE PRO</text>
</g>
<g transform="translate(300,210)">
  <!-- éclair central -->
  <g transform="translate(0,0)">
    <polygon points="-15,-90 25,-15 -5,-15 15,90 -25,15 5,15" fill="#FBBF24"/>
  </g>
  <!-- fibres lumineuses -->
  <g stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M -200,-100 Q -100,-50 -50,-30"/>
    <path d="M -200,0 Q -100,0 -50,0"/>
    <path d="M -200,100 Q -100,50 -50,30"/>
    <path d="M 200,-100 Q 100,-50 50,-30"/>
    <path d="M 200,0 Q 100,0 50,0"/>
    <path d="M 200,100 Q 100,50 50,30"/>
  </g>
  <g fill="#06B6D4">
    <circle cx="-200" cy="-100" r="6"/>
    <circle cx="-200" cy="0" r="6"/>
    <circle cx="-200" cy="100" r="6"/>
    <circle cx="200" cy="-100" r="6"/>
    <circle cx="200" cy="0" r="6"/>
    <circle cx="200" cy="100" r="6"/>
  </g>
</g>
</svg>